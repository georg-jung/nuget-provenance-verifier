name: Validate, Attest, and Deploy Pages

on:
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Validate index.html
        run: |
          # Build the pinned validator wrapper image from .github/validator so
          # Dependabot can update the GHCR base image digest for us.
          docker build --tag local/validator:latest .github/validator
          # Keep the repository bind mount read-only while validating index.html.
          docker run --rm \
            -v "$PWD:/data:ro" \
            local/validator:latest \
            vnu --skip-non-html /data/index.html

      - name: Stage site artifact
        run: |
          mkdir -p site
          cp index.html site/index.html
          touch site/.nojekyll

      - name: Attest provenance for index.html
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ github.workspace }}/site/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
